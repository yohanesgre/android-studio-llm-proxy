name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Run race detector
        run: go test -race ./...

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t android-studio-llm-proxy:ci .

      - name: Build Apple Container image
        run: docker build -f Containerfile -t android-studio-llm-proxy:ci-apple .
